services:
  # ----------------------------------------------------------------
  # BANCOS DE DADOS
  # ----------------------------------------------------------------
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - auth-postgres-data:/var/lib/postgresql/data
    networks:
      - chat-network

  cassandra:
    image: cassandra:5
    environment:
      CASSANDRA_CLUSTER_NAME: chat-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
    healthcheck:
      test: ["CMD-SHELL", "nodetool status 2>&1 | grep -q UN"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 90s
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - chat-network

  cassandra-init:
    image: cassandra:5
    command: >
      bash -c "
      until cqlsh cassandra -e 'describe keyspaces' > /dev/null 2>&1; do
        echo 'Waiting for cqlsh...'
        sleep 3
      done &&
      cqlsh cassandra -e \"CREATE KEYSPACE IF NOT EXISTS chat WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};\""
    depends_on:
      cassandra:
        condition: service_healthy
    networks:
      - chat-network
    restart: "no"

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - chat-network

  # ----------------------------------------------------------------
  # AUTH SERVICE
  # ----------------------------------------------------------------
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    environment:
      DB_URL: jdbc:postgresql://auth-db:5432/auth_db
      DB_USERNAME: auth_user
      DB_PASSWORD: ${DB_AUTH_PASSWORD}
      DDL_AUTO: validate
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-chat-multicanal}
      CORS_ALLOWED_ORIGINS: "http://gateway:8080"
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3001/actuator/health 2>/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ----------------------------------------------------------------
  # CHAT SERVICE
  # ----------------------------------------------------------------
  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      INTERNAL_SIGNING_KEY: ${INTERNAL_SIGNING_KEY}
      HISTORY_SERVICE_URL: http://history-service:3004
    depends_on:
      redis:
        condition: service_healthy
      history-service:
        condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3002/actuator/health 2>/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ----------------------------------------------------------------
  # PRESENCE SERVICE
  # ----------------------------------------------------------------
  presence-service:
    build:
      context: ./presence-service
      dockerfile: Dockerfile
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      INTERNAL_SIGNING_KEY: ${INTERNAL_SIGNING_KEY}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - chat-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3003/actuator/health 2>/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ----------------------------------------------------------------
  # HISTORY SERVICE
  # ----------------------------------------------------------------
  history-service:
    build:
      context: ./history-service
      dockerfile: Dockerfile
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: chat
      CASSANDRA_DC: datacenter1
      INTERNAL_SIGNING_KEY: ${INTERNAL_SIGNING_KEY}
    depends_on:
      cassandra-init:
        condition: service_completed_successfully
    networks:
      - chat-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:3004/actuator/health 2>/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ----------------------------------------------------------------
  # GATEWAY
  # ----------------------------------------------------------------
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-chat-multicanal}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      INTERNAL_SIGNING_KEY: ${INTERNAL_SIGNING_KEY}
      AUTH_SERVICE_HOST: auth-service
      AUTH_SERVICE_PORT: 3001
      CHAT_SERVICE_HOST: chat-service
      CHAT_SERVICE_PORT: 3002
      PRESENCE_SERVICE_HOST: presence-service
      PRESENCE_SERVICE_PORT: 3003
      HISTORY_SERVICE_HOST: history-service
      HISTORY_SERVICE_PORT: 3004
    depends_on:
      auth-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      presence-service:
        condition: service_healthy
      history-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chat-network

volumes:
  auth-postgres-data:
  cassandra-data:
  redis-data:

networks:
  chat-network:
    driver: bridge
