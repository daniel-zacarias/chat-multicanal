spring.application.name=auth-service
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Se o banco já tiver tabelas criadas pelo ddl-auto=update, habilite esta linha:
# spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=3001

# No fallback — app fails at startup if JWT_SECRET is not set
jwt.secret=${JWT_SECRET}
# Access token: 15 minutes
jwt.expiration=900000
# Refresh token: 7 days
jwt.refresh-expiration=604800000
jwt.issuer=${JWT_ISSUER:chat-multicanal}

server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never