spring:
  application:
    name: chat-service

  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: ${SERVER_PORT:3002}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.chat.chatservice: INFO
