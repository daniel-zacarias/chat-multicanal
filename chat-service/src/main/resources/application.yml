spring:
  application:
    name: chat-service

  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000ms

server:
  port: ${SERVER_PORT:3002}
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health

internal:
  signing-key: ${INTERNAL_SIGNING_KEY}

services:
  history:
    url: ${HISTORY_SERVICE_URL:http://localhost:3004}

logging:
  level:
    com.chat.chatservice: INFO
